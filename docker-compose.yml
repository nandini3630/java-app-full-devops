services:
  
  postgres:
    image: postgres:15.7-bookworm
    container_name: postgres
    environment:
      POSTGRES_DB: auctiondb
      POSTGRES_PASSWORD: password123
      POSTGRES_USER: auctionuser
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auctionuser -d auctiondb"]
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - 6379:6379

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - 9092:9092

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - 8025:8025
      - 1025:1025

  auctionx:
    build:
      context: .
      dockerfile: DockerFiles/Dockerfile.auctionx
      target: production
    container_name: auctionx
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auctiondb
      SPRING_DATASOURCE_USERNAME: auctionuser
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - 8080:8080
    security_opt:
      - no-new-privileges=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  payment:
    build: 
      context: .
      dockerfile: DockerFiles/Dockerfile.payment
      target: production
    container_name: payment
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auctiondb
      SPRING_DATASOURCE_USERNAME: auctionuser
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - 8081:8081
    security_opt:
      - no-new-privileges=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification:
    build: 
      context: .
      dockerfile: DockerFiles/Dockerfile.notificatoin
      target: production
    container_name: notification
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
    ports:
      - 8082:8082
    security_opt:
      - no-new-privileges=true
    depends_on:
      kafka:
        condition: service_started

volumes:
  postgres_data:
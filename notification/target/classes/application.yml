server:
  port: 8082

spring:
  application:
    name: notification-service

  # DevOps Magic: This points to our local Mailpit Docker container!
  # Mailpit catches all emails sent here instead of routing them to real users.
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"

services:

  postgres:
    image: postgres:15.7-bookworm
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auctiondb
      POSTGRES_PASSWORD: password123
      POSTGRES_USER: auctionuser
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auctionuser -d auctiondb"]
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
          pids: 50

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${ PUB_IP }:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - 9092:9092 
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 300

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    ports:
      - 8025:8025
      - 1025:1025
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M
          pids: 50

  auctionx:
    image: ${USERNAME}/auctionx:${GIT_SHA}
    container_name: auctionx
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auctiondb
      SPRING_DATASOURCE_USERNAME: auctionuser
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - 8080:8080
    security_opt:
      - no-new-privileges=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 512M
          pids: 100

  payment:
    image: ${USERNAME}/payment:${GIT_SHA}
    container_name: payment
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auctiondb
      SPRING_DATASOURCE_USERNAME: auctionuser
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - 8081:8081
    security_opt:
      - no-new-privileges=true
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 512M
          pids: 100

  notification:
    image: ${USERNAME}/notification:${GIT_SHA}
    container_name: notification
    restart: unless-stopped
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
    ports:
      - 8082:8082
    security_opt:
      - no-new-privileges=true
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: '1.50'
          memory: 512M
          pids: 100

  # frontend:
  #   image: ${USERNAME}/frontend:${GIT_SHA}
  #   container_name: frontend
  #   restart: unless-stopped
  #   ports:

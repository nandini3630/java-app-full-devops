name: Build And Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        service: [auctionx, payment, notification]
    env:
      GIT_SHA: ${{ github.sha }}
      USERNAME: ${{ vars.DOCKER_USERNAME }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with: 
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DockerFiles/Dockerfile.${{ matrix.service }}
          push: true
          target: production
          tags: |
            ${{ vars.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ vars.APP_VERSION }}
          sbom: true
          provenance: true
      
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: ${{ vars.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}

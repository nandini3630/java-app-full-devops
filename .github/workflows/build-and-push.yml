name: Build And Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GIT_SHA: ${{ github.sha }}
      USERNAME: ${{ vars.DOCKER_USERNAME }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with: 
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push
        run: |
          docker compose build --no-cache --push
      
      - name: Docker Scout Scan (AuctionX)
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: ${{ vars.DOCKER_USERNAME }}/auctionx:${{ github.sha }}
      
      - name: Docker Scout Scan (Payment)
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: ${{ vars.DOCKER_USERNAME }}/payment:${{ github.sha }}
      
      - name: Docker Scout Scan (Notification)
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: ${{ vars.DOCKER_USERNAME }}/notification:${{ github.sha }}
